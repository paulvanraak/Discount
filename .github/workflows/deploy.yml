name: Deploy to GitHub Pages

on:
  push:
    branches: [main]

permissions:
  contents: write

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '18'

      - name: Install dependencies
        working-directory: Discount
        run: npm install

      - name: Export Expo web build
        working-directory: Discount
        run: npx expo export --platform web

      - name: Fix asset paths for GitHub Pages sub-path
        working-directory: Discount/dist
        run: |
          sed -i 's|"/_expo/|"/Discount/_expo/|g' index.html
          sed -i "s|'/_expo/|'/Discount/_expo/|g" index.html

      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: Discount/dist
